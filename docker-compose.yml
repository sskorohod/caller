services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-caller}
      POSTGRES_USER: ${POSTGRES_USER:-caller}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-caller} -d ${POSTGRES_DB:-caller}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-caller}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    restart: unless-stopped
    # Public resolvers: the host network's resolver intermittently fails to
    # resolve api.telegram.org (EAI_AGAIN), breaking Telegram notifications while
    # other providers (x.ai, deepgram, twilio) resolve fine. Bypass it.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-caller}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-caller}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      TWILIO_WEBHOOK_SECRET: ${TWILIO_WEBHOOK_SECRET:-}
      API_DOMAIN: ${DOMAIN:-localhost}
      NODE_ENV: production
      PORT: 3011
      HOST: 0.0.0.0
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OPENAI_OAUTH_PROXY_URL: ${OPENAI_OAUTH_PROXY_URL:-}
      # Grok Voice Agent realtime model for the translator. Default
      # grok-voice-fast-1.0 (non-think) translates verbatim; the "think"
      # flagship elaborates with helper phrases. Overridable via .env to A/B
      # slugs without a rebuild.
      GROK_VOICE_MODEL: ${GROK_VOICE_MODEL:-grok-voice-fast-1.0}
      # Voice-mode engine: 'grok' (Grok Voice Agent) or 'pipeline' (Deepgram STT
      # → OpenAI translate → TTS). Flip without a code change; revert instantly.
      VOICE_ENGINE: ${VOICE_ENGINE:-grok}
      VOICE_TTS_PROVIDER: ${VOICE_TTS_PROVIDER:-xai}
      VOICE_TTS_VOICE: ${VOICE_TTS_VOICE:-eve}
      # Barge-in: sustained speech (ms) required to interrupt the spoken translation.
      VOICE_BARGE_IN_MS: ${VOICE_BARGE_IN_MS:-2000}
      SANDBOX_MAX_SECONDS: ${SANDBOX_MAX_SECONDS:-300}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-caller}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: ${MINIO_BUCKET:-caller-recordings}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-LingoLine <noreply@lingoline.net>}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3011/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"

  frontend:
    build:
      context: packages/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://backend:3011
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "8880:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      # 127.0.0.1, not localhost: alpine wget resolves localhost to ::1 first,
      # and nginx only listens on IPv4 — the check would always be "refused".
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

  # Dedicated Cloudflare Tunnel for lingoline.net — fully isolated from any
  # other product's tunnel. Remotely-managed (ingress configured in the CF
  # dashboard/API); reaches nginx over the compose network as http://nginx:80.
  # TUNNEL_TOKEN lives in .env (never commit it).
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    depends_on:
      - nginx
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

volumes:
  postgres_data:
  redis_data:
  minio_data:
